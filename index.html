async function uploadToSupabase(path,file){
  const r=await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${encodeURIComponent(path)}`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},
    body:file
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return r.json();
}

async function downloadFromSupabase(path,naam){
  const r=await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${encodeURIComponent(path)}`,{
    headers:{'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  if(!r.ok) throw new Error('Download mislukt');
  const blob=await r.blob();
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=naam;a.click();
  URL.revokeObjectURL(url);
}

async function deleteFromSupabase(path){
  await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${encodeURIComponent(path)}`,{
    method:'DELETE',
    headers:{'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
}

  DATA.klassen.forEach(k=>{
    const isExp=expanded[k.id];const isAct=sel.klasId===k.id&&!sel.onderwerpId;
    html+=`<div class="klas-block"><div class="klas-row ${isAct?'active':''}" onclick="toggleKlas(${k.id})">
      <span class="klas-icon">${k.icon}</span><span class="klas-name">${k.naam}</span>
      ${isAdmin?`<span class="klas-acts"><button class="icon-btn" onclick="event.stopPropagation();openModal('renameKlas',${k.id})">✏️</button><button class="icon-btn danger" onclick="event.stopPropagation();confirmDelete('klas',${k.id})">🗑</button></span>`:''}
      <span class="klas-chevron ${isExp?'open':''}">▶</span></div>`;
    if(isExp){
      html+=`<div class="onderwerp-list">`;
      k.onderwerpen.forEach(o=>{
        const isOAct=sel.onderwerpId===o.id;
        html+=`<div class="onderwerp-row ${isOAct?'active':''}" ${isAdmin?`draggable="true" ondragstart="dragStart(event,${k.id},${o.id})" ondragover="dragOver(event)" ondrop="dragDrop(event,${k.id},${o.id})" ondragend="dragEnd()" id="orow-${o.id}"`:''}
          onclick="selectOnderwerp(${k.id},${o.id})">
          ${isAdmin?`<span class="drag-handle">⠿</span>`:''}
          <span class="onderwerp-dot"></span><span class="onderwerp-name">${o.naam}</span>
          ${isAdmin?`<span class="o-acts"><button class="icon-btn" onclick="event.stopPropagation();openModal('renameOnderwerp',${k.id},${o.id})">✏️</button><button class="icon-btn danger" onclick="event.stopPropagation();confirmDelete('onderwerp',${k.id},${o.id})">🗑</button></span>`:''}
        </div>`;
      });
      if(isAdmin)html+=`<button class="add-o-btn visible" onclick="openModal('onderwerp',${k.id})">+ Onderwerp toevoegen</button>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  el.innerHTML=html;
}

function dragStart(e,kid,oid){
  if(oid){dragSrc={type:'onderwerp',kid,oid};}
  else{dragSrc={type:'klas',kid};}
  setTimeout(()=>{
    const el=document.getElementById(oid?'orow-'+oid:'krow-'+kid);
    el?.classList.add('dragging');
  },0);
}
function dragOver(e){e.preventDefault();}
function dragDrop(e,kid,oid){
  e.preventDefault();
  if(!dragSrc)return;
  if(dragSrc.type==='onderwerp'&&oid){
    if(dragSrc.oid===oid||dragSrc.kid!==kid)return;
    const k=findKlas(kid);
    const fi=k.onderwerpen.findIndex(o=>o.id===dragSrc.oid);
    const ti=k.onderwerpen.findIndex(o=>o.id===oid);
    const[m]=k.onderwerpen.splice(fi,1);
    k.onderwerpen.splice(ti,0,m);
  } else if(dragSrc.type==='klas'&&!oid){
    if(dragSrc.kid===kid)return;
    const fi=DATA.klassen.findIndex(k=>k.id===dragSrc.kid);
    const ti=DATA.klassen.findIndex(k=>k.id===kid);
    const[m]=DATA.klassen.splice(fi,1);
    DATA.klassen.splice(ti,0,m);
  }
  saveLocal();render();
}
function dragEnd(){document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));dragSrc=null;}

function renderMain(){
  const main=document.getElementById('main');
  if(!sel.klasId){
    let html=`<div class="welcome"><div class="welcome-title">${isAdmin?'Welkom, Mr. Walschap 👋':'Wiskunde met Walschap'}</div>
      <p class="welcome-sub">${isAdmin?'Beheermodus actief.':'Kies een klas om oefeningen te bekijken en te downloaden.'}</p>
      <div class="klas-grid">`;
    DATA.klassen.forEach(k=>{
      const count=k.onderwerpen.reduce((a,o)=>a+o.submappen.reduce((b,s)=>b+s.bestanden.length,0),0);
      html+=`<div class="klas-card" onclick="toggleKlas(${k.id})"><div class="klas-card-icon">${k.icon}</div><div class="klas-card-name">${k.naam}</div><div class="klas-card-count">${count} bestand${count!==1?'en':''}</div></div>`;
    });
    html+=`</div></div>`;main.innerHTML=html;return;
  }
  const klas=findKlas(sel.klasId);
  if(!sel.onderwerpId){
    let html=`<div class="breadcrumb"><span class="crumb" onclick="goHome()">Startpagina</span> › <span>${klas.icon} ${klas.naam}</span></div>
      <h1 class="page-title">${klas.naam}</h1><p class="page-sub">Kies een onderwerp</p>
      ${!isAdmin?`<div class="leerling-banner">📖 Je kan alle bestanden bekijken en downloaden.</div>`:''}
      <div class="folder-grid">`;
    klas.onderwerpen.forEach(o=>{
      const count=o.submappen.reduce((a,s)=>a+s.bestanden.length,0);
      html+=`<div class="folder-card" onclick="selectOnderwerp(${klas.id},${o.id})">
        ${isAdmin?`<button class="del-btn" style="display:block" onclick="event.stopPropagation();confirmDelete('onderwerp',${klas.id},${o.id})">✕</button>`:''}
        <div class="folder-icon">📂</div><div class="folder-name">${o.naam}</div><div class="folder-count">${count} bestand${count!==1?'en':''}</div></div>`;
    });
    html+=`</div>`;
    if(isAdmin)html+=`<button style="font-size:0.88rem;padding:8px 14px;border:1px dashed var(--border);border-radius:8px;background:none;cursor:pointer;color:var(--muted);font-family:DM Sans,sans-serif" onclick="openModal('onderwerp',${klas.id})">+ Onderwerp toevoegen</button>`;
    main.innerHTML=html;return;
  }
  const onderwerp=findOnderwerp(sel.klasId,sel.onderwerpId);
  if(!sel.submapId||!onderwerp.submappen.find(s=>s.id===sel.submapId))sel.submapId=onderwerp.submappen[0]?.id||null;
  const submap=onderwerp.submappen.find(s=>s.id===sel.submapId);
  let html=`<div class="breadcrumb"><span class="crumb" onclick="goHome()">Startpagina</span> › <span class="crumb" onclick="selectKlas(${klas.id})">${klas.icon} ${klas.naam}</span> › <span>${onderwerp.naam}</span></div>
    <h1 class="page-title">${onderwerp.naam}</h1><p class="page-sub">${klas.naam}</p>
    ${!isAdmin?`<div class="leerling-banner">📖 Klik op een bestand om het te downloaden.</div>`:''}
    <div class="submap-tabs">`;
  onderwerp.submappen.forEach(s=>{
    html+=`<div class="submap-tab ${sel.submapId===s.id?'active':''}" onclick="selectSubmap(${s.id})">${s.naam}<span class="tab-count">${s.bestanden.length}</span></div>`;
  });
  if(isAdmin)html+=`<button class="btn-add-sub visible" onclick="openModal('submap',${klas.id},${onderwerp.id})">+ Submap</button>`;
  html+=`</div>`;
  if(submap){
    if(submap.bestanden.length>0){
      html+=`<button class="download-all-btn" onclick="downloadAll(${submap.id})">↓ Alles downloaden (${submap.bestanden.length})</button>`;
      html+=`<div class="section-label">Bestanden in "${submap.naam}"</div><div class="files-grid">`;
      submap.bestanden.forEach(f=>{
        const icon=f.type==='pdf'?'📄':f.type==='img'?'🖼️':f.type==='ppt'?'📊':'📝';
        html+=`<div class="file-card" onclick="downloadFile('${f.path}','${f.naam}')">
          ${isAdmin?`<button class="del-btn" style="display:block" onclick="event.stopPropagation();deleteFile(${submap.id},${f.id},'${f.path}')">✕</button>`:''}
          <div class="dl-badge">↓</div><div class="file-icon">${icon}</div>
          <div class="file-name">${f.naam}</div><div class="file-date">${f.datum}</div></div>`;
      });
      html+=`</div>`;
    }else{
      html+=`<div class="empty"><div class="empty-icon">📂</div><p>${isAdmin?'Nog geen bestanden. Upload hieronder.':'Nog geen bestanden in deze map.'}</p></div>`;
    }
    if(isAdmin){
      html+=`<div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event,${submap.id})">
        <div class="upload-icon">☁</div>
        <p><strong>${submap.bestanden.length>0?'Meer bestanden toevoegen':'Bestanden toevoegen'}</strong></p>
        <p>PDF, Word, PowerPoint, afbeeldingen</p></div>`;
      document.getElementById('file-input').onchange=(e)=>handleUpload(e,submap.id);
    }
  }
  main.innerHTML=html;
}

function render(){renderSidebar();renderMain();}
function goHome(){sel={klasId:null,onderwerpId:null,submapId:null};render();}
function toggleKlas(id){if(expanded[id]&&sel.klasId===id&&!sel.onderwerpId){expanded[id]=false;sel={klasId:null,onderwerpId:null,submapId:null};}else{expanded[id]=!expanded[id];sel.klasId=id;sel.onderwerpId=null;sel.submapId=null;}render();}
function selectKlas(id){sel.klasId=id;sel.onderwerpId=null;sel.submapId=null;expanded[id]=true;render();}
function selectOnderwerp(kid,oid){sel.klasId=kid;sel.onderwerpId=oid;expanded[kid]=true;sel.submapId=null;render();}
function selectSubmap(sid){sel.submapId=sid;render();}

async function handleUpload(e,sid){const files=Array.from(e.target.files);e.target.value='';if(!files.length)return;await uploadFiles(files,sid);}
async function handleDrop(e,sid){e.preventDefault();document.getElementById('upload-zone')?.classList.remove('drag');await uploadFiles(Array.from(e.dataTransfer.files),sid);}

async function uploadFiles(files,sid){
  const ctx=findContext(sid);if(!ctx)return;
  const today=new Date();
  const d=`${today.getDate().toString().padStart(2,'0')}/${(today.getMonth()+1).toString().padStart(2,'0')}/${today.getFullYear()}`;
  let done=0;
  showToast(`0/${files.length} uploaden...`);
  for(const file of files){
    try{
      const path=sbPath(ctx.klas,ctx.onderwerp,ctx.submap,file.name);
      await uploadToSupabase(path,file);
      const ext=file.name.split('.').pop().toLowerCase();
      const type=ext==='pdf'?'pdf':['png','jpg','jpeg'].includes(ext)?'img':['ppt','pptx'].includes(ext)?'ppt':'doc';
      ctx.submap.bestanden.push({id:nextId++,naam:file.name,type,datum:d,path});
      done++;showToast(`${done}/${files.length} geüpload...`);
    }catch(err){showToast(`Fout: ${file.name} - ${err.message}`);}
  }
  saveLocal();showToast(`${done} bestand${done!==1?'en':''} geüpload!`);render();
}

async function downloadFile(path,naam){
  try{showToast(`"${naam}" downloaden...`);await downloadFromSupabase(path,naam);showToast(`"${naam}" gedownload!`);}
  catch(e){showToast('Download mislukt.');}
}
async function downloadAll(sid){
  const s=findSubmapGlobal(sid);if(!s||!s.bestanden.length)return;
  for(const f of s.bestanden)await downloadFile(f.path,f.naam);
}

async function deleteFile(sid,fid,path){
  const s=findSubmapGlobal(sid);if(!s)return;
  try{
    await deleteFromSupabase(path);
    s.bestanden=s.bestanden.filter(f=>f.id!==fid);
    saveLocal();showToast('Bestand verwijderd');render();
  }catch(e){showToast('Verwijderen mislukt.');}
}

function openModal(type,a1,a2){
  document.getElementById('modal-overlay').classList.add('show');
  const t=document.getElementById('modal-title');
  const b=document.getElementById('modal-body');
  const bt=document.getElementById('modal-btns');
  const std=`<button class="btn-cancel" onclick="closeModal()">Annuleren</button><button class="btn-confirm" onclick="confirmModal()">Toevoegen</button>`;
  const sav=`<button class="btn-cancel" onclick="closeModal()">Annuleren</button><button class="btn-confirm" onclick="confirmModal()">Opslaan</button>`;
  if(type==='klas'){t.textContent='Nieuwe klas';b.innerHTML=`<input id="modal-input" placeholder="bv. 3de jaar...">`;bt.innerHTML=std;
    modalCb=()=>{const v=document.getElementById('modal-input').value.trim();if(!v)return false;const icons=['📘','📗','📙','📕','📓','📔'];const id=nextId++;DATA.klassen.push({id,naam:v,icon:icons[DATA.klassen.length%icons.length],onderwerpen:[]});expanded[id]=true;sel.klasId=id;sel.onderwerpId=null;sel.submapId=null;saveLocal();showToast(`Klas "${v}" toegevoegd`);return true;};}
  else if(type==='renameKlas'){const k=findKlas(a1);t.textContent='Klas hernoemen';b.innerHTML=`<input id="modal-input" value="${k.naam}">`;bt.innerHTML=sav;
    modalCb=()=>{const v=document.getElementById('modal-input').value.trim();if(!v)return false;k.naam=v;saveLocal();showToast('Klas hernoemd');return true;};}
  else if(type==='onderwerp'){t.textContent='Nieuw onderwerp';b.innerHTML=`<input id="modal-input" placeholder="bv. Integraalrekening...">`;bt.innerHTML=std;
    modalCb=()=>{const v=document.getElementById('modal-input').value.trim();if(!v)return false;const k=findKlas(a1);const id=nextId++;k.onderwerpen.push({id,naam:v,submappen:[{id:nextId++,naam:'Theorie',bestanden:[]},{id:nextId++,naam:'Oefeningen',bestanden:[]}]});sel.klasId=a1;sel.onderwerpId=id;sel.submapId=null;expanded[a1]=true;saveLocal();showToast(`Onderwerp "${v}" toegevoegd`);return true;};}
  else if(type==='renameOnderwerp'){const o=findOnderwerp(a1,a2);t.textContent='Onderwerp hernoemen';b.innerHTML=`<input id="modal-input" value="${o.naam}">`;bt.innerHTML=sav;
    modalCb=()=>{const v=document.getElementById('modal-input').value.trim();if(!v)return false;o.naam=v;saveLocal();showToast('Onderwerp hernoemd');return true;};}
  else if(type==='submap'){t.textContent='Nieuwe submap';b.innerHTML=`<input id="modal-input" placeholder="bv. Reflectie, Toets...">`;bt.innerHTML=std;
    modalCb=()=>{const v=document.getElementById('modal-input').value.trim();if(!v)return false;const o=findOnderwerp(a1,a2);const id=nextId++;o.submappen.push({id,naam:v,bestanden:[]});sel.submapId=id;saveLocal();showToast(`Submap "${v}" toegevoegd`);return true;};}
  setTimeout(()=>{const i=document.getElementById('modal-input');if(i){i.focus();i.select();i.onkeydown=e=>{if(e.key==='Enter')confirmModal();};}},50);
}

function confirmDelete(type,a1,a2){
  document.getElementById('modal-overlay').classList.add('show');
  const naam=type==='klas'?findKlas(a1).naam:findOnderwerp(a1,a2).naam;
  document.getElementById('modal-title').textContent=type==='klas'?'Klas verwijderen':'Onderwerp verwijderen';
  document.getElementById('modal-body').innerHTML=`<p class="confirm-msg">Ben je zeker dat je <strong>${naam}</strong> wil verwijderen?</p>`;
  document.getElementById('modal-btns').innerHTML=`<button class="btn-cancel" onclick="closeModal()">Annuleren</button><button class="btn-danger" onclick="doDelete('${type}',${a1},${a2||0})">Verwijderen</button>`;
}
function doDelete(type,a1,a2){closeModal();if(type==='klas'){DATA.klassen=DATA.klassen.filter(k=>k.id!==a1);if(sel.klasId===a1)sel={klasId:null,onderwerpId:null,submapId:null};showToast('Klas verwijderd');}else{const k=findKlas(a1);k.onderwerpen=k.onderwerpen.filter(o=>o.id!==a2);if(sel.onderwerpId===a2){sel.onderwerpId=null;sel.submapId=null;}showToast('Onderwerp verwijderd');}saveLocal();render();}
function confirmModal(){if(modalCb&&modalCb()!==false){closeModal();render();}}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');modalCb=null;}

let toastTimer;
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}

function handleSearch(query){
  const q=query.toLowerCase().trim();
  if(!q){document.getElementById('search-results-container')?.remove();renderMain();return;}
  const results=[];
  DATA.klassen.forEach(k=>{
    k.onderwerpen.forEach(o=>{
      o.submappen.forEach(s=>{
        s.bestanden.forEach(f=>{
          if(f.naam.toLowerCase().includes(q)||o.naam.toLowerCase().includes(q)||k.naam.toLowerCase().includes(q)||s.naam.toLowerCase().includes(q)){
            results.push({bestand:f,submap:s,onderwerp:o,klas:k});
          }
        });
      });
    });
  });
  const main=document.getElementById('main');
  const icon=f=>f.type==='pdf'?'📄':f.type==='img'?'🖼️':f.type==='ppt'?'📊':'📝';
  let html=`<div class="search-results" id="search-results-container">
    <h1 class="page-title" style="margin-bottom:0.5rem">Zoekresultaten</h1>
    <p class="page-sub">${results.length} resultaat${results.length!==1?'en':''} voor "<strong>${query}</strong>"</p>`;
  if(results.length===0){
    html+=`<div class="search-empty">😕 Geen bestanden gevonden voor "${query}"</div>`;
  } else {
    results.forEach(r=>{
      html+=`<div class="search-result-item" onclick="downloadFile('${r.bestand.path}','${r.bestand.naam}')">
        <div class="search-result-icon">${icon(r.bestand)}</div>
        <div class="search-result-info">
          <div class="search-result-name">${r.bestand.naam}</div>
          <div class="search-result-path">${r.klas.naam} › ${r.onderwerp.naam} › ${r.submap.naam}</div>
        </div>
        <div style="color:var(--muted);font-size:0.75rem">${r.bestand.datum}</div>
      </div>`;
    });
  }
  html+=`</div>`;
  main.innerHTML=html;
}

loadLocal();render();
</script>
</body>
</html>
